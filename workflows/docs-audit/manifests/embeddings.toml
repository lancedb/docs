name = "embeddings"
description = "Audit the embeddings docs against public SDK embedding APIs, tested snippets, provider surfaces, and Enterprise behavior."
docs_repo = "docs"
rotation_unit = "page"
keywords = [
  "embedding",
  "embeddings",
  "vector",
  "EmbeddingFunction",
  "TextEmbeddingFunction",
  "EmbeddingFunctionRegistry",
  "get_registry",
  "getRegistry",
  "SourceField",
  "VectorField",
  "sourceField",
  "vectorField",
  "add_embedding",
  "EmbeddingDefinition",
  "compute_query_embeddings",
  "computeQueryEmbeddings",
  "compute_source_embeddings",
  "computeSourceEmbeddings",
]

[[pages]]
id = "overview"
title = "Managing Embeddings"
path = "docs/embedding/index.mdx"
keywords = ["embedding registry", "providers", "SourceField", "VectorField", "custom embedding functions", "Enterprise", "manual query embeddings", "max_retries", "$var"]

[[pages]]
id = "quickstart"
title = "Embeddings: Quickstart"
path = "docs/embedding/quickstart.mdx"
keywords = ["quickstart", "get_registry", "sentence-transformers", "BAAI/bge-small-en-v1.5", "SourceField", "VectorField", "automatic embedding", "table.search(query)", "Enterprise"]

